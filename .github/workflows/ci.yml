name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  GO_VERSION: '1.22'
  NODE_VERSION: '20'
  REGISTRY: ghcr.io

jobs:
  lint-go:
    name: Lint Go
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v4
        with:
          version: latest
          working-directory: services/api

  test-go:
    name: Test Go Services
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: analytics_test
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Test gocommon
        run: go test -v -race -coverprofile=coverage.out ./...
        working-directory: packages/gocommon
        env:
          DATABASE_URL: postgres://test:test@localhost:5432/analytics_test?sslmode=disable
          REDIS_URL: redis://localhost:6379/0

      - name: Test API
        run: go test -v -race ./...
        working-directory: services/api
        env:
          DATABASE_URL: postgres://test:test@localhost:5432/analytics_test?sslmode=disable
          REDIS_URL: redis://localhost:6379/0

      - name: Test Collector
        run: go test -v -race ./...
        working-directory: services/collector
        env:
          DATABASE_URL: postgres://test:test@localhost:5432/analytics_test?sslmode=disable
          REDIS_URL: redis://localhost:6379/0

      - name: Test Worker
        run: go test -v -race ./...
        working-directory: services/worker
        env:
          REDIS_URL: redis://localhost:6379/0

  test-frontend:
    name: Test Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 8

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
          cache-dependency-path: apps/dashboard/pnpm-lock.yaml

      - name: Install Dashboard Dependencies
        run: pnpm install
        working-directory: apps/dashboard

      - name: Typecheck Dashboard
        run: pnpm typecheck
        working-directory: apps/dashboard

      - name: Build Dashboard
        run: pnpm build
        working-directory: apps/dashboard

      - name: Install Tracker Dependencies
        run: pnpm install
        working-directory: apps/tracker

      - name: Typecheck Tracker
        run: pnpm typecheck
        working-directory: apps/tracker

      - name: Build Tracker
        run: pnpm build
        working-directory: apps/tracker

  build-images:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: [test-go, test-frontend]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    
    strategy:
      matrix:
        service: [api, collector, worker]

    steps:
      - uses: actions/checkout@v4

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}-${{ matrix.service }}
          tags: |
            type=sha,prefix=
            type=ref,event=branch
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: services/${{ matrix.service }}/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-dashboard:
    name: Build Dashboard Image
    runs-on: ubuntu-latest
    needs: [test-frontend]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Dashboard
        uses: docker/build-push-action@v5
        with:
          context: apps/dashboard
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository }}-dashboard:latest
            ${{ env.REGISTRY }}/${{ github.repository }}-dashboard:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
