replicaCount:
  api: 2
  collector: 3
  worker: 2
  dashboard: 2

image:
  registry: ghcr.io
  pullPolicy: IfNotPresent
  api:
    repository: your-org/analytics-api
    tag: latest
  collector:
    repository: your-org/analytics-collector
    tag: latest
  worker:
    repository: your-org/analytics-worker
    tag: latest
  dashboard:
    repository: your-org/analytics-dashboard
    tag: latest

imagePullSecrets: []

serviceAccount:
  create: true
  annotations: {}
  name: ""

api:
  port: 8080
  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 100m
      memory: 128Mi
  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 10
    targetCPUUtilizationPercentage: 70

collector:
  port: 8081
  resources:
    limits:
      cpu: 1000m
      memory: 1Gi
    requests:
      cpu: 200m
      memory: 256Mi
  autoscaling:
    enabled: true
    minReplicas: 3
    maxReplicas: 20
    targetCPUUtilizationPercentage: 60

worker:
  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 100m
      memory: 128Mi
  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 10
    customMetrics:
      - type: External
        external:
          metric:
            name: redis_stream_lag
          target:
            type: AverageValue
            averageValue: "10000"

dashboard:
  port: 3000
  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 100m
      memory: 128Mi

ingress:
  enabled: true
  className: nginx
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
  hosts:
    api:
      host: api.analytics.yourdomain.com
      paths:
        - path: /
          pathType: Prefix
    collector:
      host: collect.analytics.yourdomain.com
      paths:
        - path: /
          pathType: Prefix
    dashboard:
      host: app.analytics.yourdomain.com
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: analytics-tls
      hosts:
        - api.analytics.yourdomain.com
        - collect.analytics.yourdomain.com
        - app.analytics.yourdomain.com

postgresql:
  enabled: true
  auth:
    postgresPassword: "change-me-in-production"
    username: analytics
    password: "change-me-in-production"
    database: analytics
  primary:
    persistence:
      enabled: true
      size: 50Gi
    resources:
      limits:
        cpu: 1000m
        memory: 2Gi
      requests:
        cpu: 500m
        memory: 1Gi

redis:
  enabled: true
  auth:
    enabled: true
    password: "change-me-in-production"
  master:
    persistence:
      enabled: true
      size: 10Gi
    resources:
      limits:
        cpu: 500m
        memory: 512Mi
      requests:
        cpu: 100m
        memory: 128Mi

clickhouse:
  enabled: false
  external:
    host: clickhouse.clickhouse.svc.cluster.local
    port: 9000
    database: analytics
    username: analytics
    password: "change-me-in-production"

env:
  JWT_SECRET: "change-this-to-a-secure-random-string"
  JWT_ISSUER: "analytics-platform"
  CORS_ORIGINS: "https://app.analytics.yourdomain.com"

observability:
  opentelemetry:
    enabled: true
    endpoint: "http://otel-collector.observability:4317"
  prometheus:
    enabled: true
    serviceMonitor:
      enabled: true

podDisruptionBudget:
  api:
    enabled: true
    minAvailable: 1
  collector:
    enabled: true
    minAvailable: 2
  worker:
    enabled: true
    minAvailable: 1

nodeSelector: {}
tolerations: []
affinity: {}
